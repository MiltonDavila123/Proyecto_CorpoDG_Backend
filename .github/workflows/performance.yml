name: Performance Tests

on:
  push:
    branches: [staging, main, develop, feat/gabriel/chatbot_v2]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  performance:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: prueba_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SECRET_KEY: django-insecure-ci-test-key
      DEBUG: "True"
      ALLOWED_HOSTS: localhost,127.0.0.1
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: prueba_test
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: localhost
      DB_PORT: 5432
      GROQ_API_KEY: dummy
      STRIPE_SECRET_KEY: sk_test_dummy
      STRIPE_PUBLISHABLE_KEY: pk_test_dummy
      STRIPE_WEBHOOK_SECRET: whsec_dummy
      BOOKING_SANDBOX: "1"
      SEATMAP_SANDBOX: "1"
      BOOKING_SEND_EMAIL: "0"
      CLIENT_ID: dummy
      CLIENT_SECRET: dummy
      SABRE_AUTH_URL: https://example.com
      SABRE_TOKEN_REFRESH_MARGIN: "60"
      FRONTEND_BOOKING_SUCCESS_URL: http://localhost:5173/reserva/confirmada
      FRONTEND_BOOKING_CANCEL_URL: http://localhost:5173/reserva/cancelada
      CORS_ALLOWED_ORIGINS: http://localhost:5173
      WHATSAPP_TOKEN: dummy
      WHATSAPP_PHONE_NUMBER_ID: "0"
      WHATSAPP_TEMPLATE_NAME: dummy
      WHATSAPP_TEMPLATE_LANGUAGE: es_EC
      WHATSAPP_RECIPIENT_NUMBER: "0"
      EMAIL_BACKEND: django.core.mail.backends.console.EmailBackend
      XAI_API_KEY: dummy
      XAI_MODEL: llama-3.3-70b-versatile
      XAI_API_BASE_URL: https://api.groq.com/openai/v1

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run migrations and seed
        run: |
          python manage.py migrate --run-syncdb
          python manage.py seed_data

      - name: Install k6
        run: |
          sudo apt-get update
          sudo apt-get install -y ca-certificates curl gnupg
          sudo gpg -k || true
          curl -fsSL https://dl.k6.io/key.gpg | sudo gpg --dearmor -o /usr/share/keyrings/k6-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6

      - name: Start Django dev server
        run: |
          python manage.py runserver 0.0.0.0:8000 &
          sleep 3
          curl -sf http://localhost:8000/api/health/ | python -c "import sys,json; d=json.load(sys.stdin); assert d.get('status')=='ok', f'unexpected: {d}'"

      - name: Run k6 performance tests (local)
        run: |
          k6 run tests/performance/scenarios.js \
            -e BASE_URL=http://localhost:8000/api \
            --summary-export=summary-local.json \
            --out json=resultados-local.json

      - name: Upload local performance results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-local-results
          path: |
            summary-local.json
            resultados-local.json
          retention-days: 30

      - name: Print local threshold check
        run: |
          python -c "
          import json
          with open('summary-local.json') as f:
              d = json.load(f)
          metrics = d.get('metrics', {})
          checks = {'destinos': 'p(95)<3000ms', 'paquetes': 'p(95)<3000ms', 'vuelos_live': 'p(95)<30000ms'}
          all_ok = True
          for name, threshold in checks.items():
              m = metrics.get(name, {})
              p95 = m.get('type') == 'trend' and m.get('data', {}).get('p(95)', 0) or 0
              ok = p95 < (30000 if 'vuelos' in name else 3000)
              status = 'PASS' if ok else 'FAIL'
              print(f'  [{status}] {name}: p95={p95:.0f}ms (threshold: {threshold})')
              if not ok:
                  all_ok = False
          if not all_ok:
              exit(1)
          print('Todos los thresholds de performance OK')
          "
