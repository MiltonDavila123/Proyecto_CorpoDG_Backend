{% extends "admin/base_site.html" %}
{% load static %}

{% block extrastyle %}
  {{ block.super }}
  <link rel="stylesheet" type="text/css" href="{% static 'css/admin-corpodg.css' %}">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Inter', system-ui, sans-serif; }

    .dashboard #content {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 24px;
      align-items: start;
    }

    .dashboard #content-main { min-width: 0; }

    .dashboard #content-related { margin: 0; }

    @media (max-width: 1024px) {
      .dashboard #content {
        grid-template-columns: 1fr;
      }
    }

    /* Banner de notificación de nuevas reservas */
    #corpodg-notif-reservas {
      display: none;
      position: fixed;
      top: 70px;
      right: 18px;
      z-index: 9999;
      max-width: 320px;
      background: #1a365d;
      color: #fff;
      border-left: 5px solid #ed8936;
      border-radius: 8px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.35);
      padding: 14px 16px;
      font-size: 0.85rem;
    }
    #corpodg-notif-reservas strong { color: #ed8936; }
    #corpodg-notif-reservas a {
      color: #fff;
      text-decoration: underline;
    }
    #corpodg-notif-reservas .notif-close {
      position: absolute;
      top: 4px;
      right: 8px;
      cursor: pointer;
      color: rgba(255,255,255,0.7);
      background: none;
      border: none;
      font-size: 1rem;
    }
  </style>

  <script>
    // Notificación de reservas sin revisar (para asesores y admin)
    (function () {
      function pintarNotificacion(data) {
        var banner = document.getElementById('corpodg-notif-reservas');
        if (!banner) {
          banner = document.createElement('div');
          banner.id = 'corpodg-notif-reservas';
          document.body.appendChild(banner);
        }
        if (!data || !data.total) {
          banner.style.display = 'none';
          return;
        }
        var partes = [];
        if (data.reservas_vuelo) {
          partes.push('<a href="/admin/servicios/reservavuelo/?revisada__exact=0">' +
                      data.reservas_vuelo + ' de vuelo</a>');
        }
        if (data.reservas_paquete) {
          partes.push('<a href="/admin/servicios/reservapaquete/?revisada__exact=0">' +
                      data.reservas_paquete + ' de paquete</a>');
        }
        banner.innerHTML =
          '<button type="button" class="notif-close" title="Ocultar">&times;</button>' +
          '🔔 <strong>' + data.total + ' reserva(s) sin revisar</strong><br>' +
          'Pendientes: ' + partes.join(' y ') + '.';
        banner.style.display = 'block';
        banner.querySelector('.notif-close').onclick = function () {
          banner.style.display = 'none';
        };
      }

      function consultar() {
        fetch('/api/admin-notificaciones/', {credentials: 'same-origin'})
          .then(function (r) { return r.ok ? r.json() : null; })
          .then(pintarNotificacion)
          .catch(function () {});
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', consultar);
      } else {
        consultar();
      }
      setInterval(consultar, 60000); // refrescar cada minuto
    })();
  </script>
{% endblock %}

{% block branding %}
<div style="display: flex; align-items: center; gap: 14px; padding: 6px 0;">
  <img src="{% static 'logo.png' %}" alt="CorpoDG" height="42" style="display: block; filter: brightness(0) invert(1);">
  <div>
    <h1 style="margin: 0; font-size: 1.15rem; font-weight: 600; letter-spacing: -0.02em; color: #fff;">
      {{ site_header|default:"CorpoDG Trip593" }}
    </h1>
    <span style="font-size: 0.7rem; color: rgba(255,255,255,0.7); font-weight: 400;">
      Panel de Administración
    </span>
  </div>
</div>
{% endblock %}
